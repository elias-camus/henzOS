# henzOS default i3 appearance
# DO NOT EDIT - override in ~/.config/i3/local.conf

font pango:UDEV Gothic 35NF 7

gaps inner 8
gaps outer 4
smart_gaps on
smart_borders on

default_border pixel 2
default_floating_border pixel 2

# Window colors (use theme variables)
client.focused          $accent  $accent  $bg     $accent  $accent
client.focused_inactive $bg_alt  $bg_alt  $fg     $bg_alt  $bg_alt
client.unfocused        $bg_alt  $bg_alt  $muted  $bg_alt  $bg_alt
client.urgent           $urgent  $urgent  $fg     $urgent  $urgent
client.placeholder      $bg_alt  $bg_alt  $fg     $bg_alt  $bg_alt
client.background       $bg
