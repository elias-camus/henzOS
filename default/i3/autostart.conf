# henzOS default i3 autostart applications
# DO NOT EDIT - add custom startup commands in ~/.config/i3/local.conf

# Compositor
exec --no-startup-id picom --config ~/.config/picom/picom.conf

# Wallpaper
exec_always --no-startup-id feh --bg-fill ~/.local/share/henzos/wallpapers/current

# Status bar
exec --no-startup-id bash ~/.config/polybar/launch.sh

# Notification daemon
exec --no-startup-id dunst

# XDG autostart
exec --no-startup-id dex --autostart --environment i3

# Screen lock
exec --no-startup-id xss-lock --transfer-sleep-lock -- i3lock --nofork -c 0b0f10

# Input method
exec --no-startup-id ibus-daemon -drx --xim

# NetworkManager applet
exec --no-startup-id nm-applet

# Auto-mount removable media
exec --no-startup-id udiskie --tray

# Disable screen blanking
exec --no-startup-id xset s off -dpms
exec --no-startup-id xset s noblank
