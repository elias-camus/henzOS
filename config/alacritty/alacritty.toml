# henzOS Alacritty configuration
# Theme colors are loaded from the active henzOS theme.

import = [
  "~/.config/henzos/current/theme/alacritty.toml"
]

[window]
opacity = 0.93
padding = { x = 4, y = 4 }

[font]
size = 12.0

[font.normal]
family = "UDEV Gothic 35NF"
style = "Regular"

[font.bold]
family = "UDEV Gothic 35NF"
style = "Bold"

[font.italic]
family = "UDEV Gothic 35NF"
style = "Italic"

[font.bold_italic]
family = "UDEV Gothic 35NF"
style = "Bold Italic"
