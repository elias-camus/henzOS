; henzOS Polybar configuration
; Theme colors are loaded from the active henzOS theme.

include-file = ~/.config/henzos/current/theme/polybar.ini

[bar/main]
width = 100%
height = 30
radius = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
line-color = ${colors.accent}

padding-left = 1
padding-right = 1
module-margin = 2

font-0 = UDEV Gothic 35NF:size=10;2
font-1 = UDEV Gothic 35NF:size=10;2

modules-left = i3
modules-center = title
modules-right = pulseaudio cpu memory cpu_temp gpu wlan eth date

tray-position = right
tray-padding = 2

enable-ipc = true

[module/i3]
type = internal/i3
format = <label-state>

label-focused = %name%
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.accent}
label-focused-padding = 2

label-unfocused = %name%
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 2

label-visible = %name%
label-visible-foreground = ${colors.foreground}
label-visible-padding = 2

label-urgent = %name%
label-urgent-foreground = ${colors.background}
label-urgent-background = ${colors.urgent}
label-urgent-padding = 2

[module/title]
type = internal/xwindow
format = <label>
label = %title%
label-maxlen = 60
label-empty = Desktop
label-empty-foreground = ${colors.muted}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = VOL %percentage%%
label-muted = VOL muted
label-muted-foreground = ${colors.muted}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.accent}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 3
format-prefix = "MEM "
format-prefix-foreground = ${colors.accent}
label = %percentage_used%%

[module/cpu_temp]
type = custom/script
exec = ~/.config/polybar/scripts/cpu_temp.sh
interval = 5
format-prefix-foreground = ${colors.accent}

[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu_status.sh
interval = 5
format-prefix-foreground = ${colors.accent}

[module/wlan]
type = internal/network
interface-type = wireless
interval = 3
format-connected = <label-connected>
label-connected = W %essid% %signal%%
format-disconnected = <label-disconnected>
label-disconnected = W down
label-disconnected-foreground = ${colors.muted}

[module/eth]
type = internal/network
interface-type = wired
interval = 3
format-connected = <label-connected>
label-connected = E %local_ip%
format-disconnected = <label-disconnected>
label-disconnected = E down
label-disconnected-foreground = ${colors.muted}

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M
label = %date%  %time%
