# henzOS Picom configuration

backend = "glx";
vsync = true;

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -4;
shadow-offset-y = -4;
shadow-opacity = 0.25;

shadow-exclude = [
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Opacity
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

opacity-rule = [
  "93:class_g = 'Alacritty'"
];

# Rounded corners
corner-radius = 0;

# Blur (optional, uncomment for blur effect)
# blur-method = "dual_kawase";
# blur-strength = 5;
